<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin – Product Form')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
<div class="page-content container" style="max-width:640px">
    <h1 class="page-title" th:text="${product != null} ? 'Edit Product' : 'New Product'"></h1>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="card">
        <div class="card-body">
            <form th:action="${product != null} ? @{/admin/products/{id}/edit(id=${product.id})} : @{/admin/products/new}"
                  method="post">
                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input name="name" type="text" class="form-control"
                           th:value="${product?.name}" required maxlength="150"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" maxlength="1000"
                              th:text="${product?.description}"></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Price (AUD) *</label>
                        <input name="price" type="number" step="0.01" min="0.01"
                               class="form-control" th:value="${product?.price}" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stock Quantity *</label>
                        <input name="stockQuantity" type="number" min="0"
                               class="form-control" th:value="${product?.stockQuantity}" required/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Category (ProductCategory) *</label>
                    <select name="categoryId" class="form-control form-select" required>
                        <option value="">— Select category —</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${product != null and product.category.id == cat.id}"></option>
                    </select>
                </div>
                <div class="flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary"
                            th:text="${product != null} ? 'Save Changes' : 'Create Product'"></button>
                    <a th:href="@{/admin/products}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
