<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head th:replace="~{fragments/layout :: head('Order Details')}"></head>
    <body>
        <div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
        <div class="page-content container" style="max-width:800px">
            <div class="flex justify-between items-center mb-2">
                <h1 class="page-title" style="margin:0" th:text="'Order #' + ${order.id}"></h1>
                <span class="badge" style="font-size:0.9rem; padding:0.3rem 1rem" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}"></span>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="card mb-2">
                <div class="card-header">Items</div>
                <div class="card-body" style="padding:0">
                    <table>
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Unit Price</th>
                                <th>Qty</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.productName}"></td>
                                <td th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td><strong th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></strong>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="cart-total" style="border-radius:0">
                        <span class="cart-total-label">Total</span>
                        <span class="cart-total-amount" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
                    </div>
                </div>
            </div>

            <div class="grid-2" style="gap:1rem; align-items:start">
                <div class="card">
                    <div class="card-header">Delivery</div>
                    <div class="card-body">
                        <p><strong>Address:</strong> <span th:text="${order.deliveryAddress}"></span></p>
                        <p class="mt-1"><strong>Placed:</strong>
                            <span th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy HH:mm')}"></span></p>
                        <p class="mt-1"><strong>Payment:</strong>
                            <span class="text-muted" th:text="${order.payment != null ? order.payment.note : 'No payment recorded'}"></span>
                        </p>
                    </div>
                </div>

                <div class="card" th:if="${shipment != null}">
                    <div class="card-header">Shipment</div>
                    <div class="card-body">
                        <p><strong>Status:</strong>
                            <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(shipment.status)}" th:text="${shipment.status}"></span>
                        </p>
                        <p class="mt-1" th:if="${shipment.courierName}">
                            <strong>Courier:</strong> <span th:text="${shipment.courierName}"></span></p>
                        <p class="mt-1" th:if="${shipment.trackingNumber}">
                            <strong>Tracking:</strong> <span th:text="${shipment.trackingNumber}"></span></p>
                        <p class="mt-1" th:if="${shipment.estimatedDelivery}">
                            <strong>Est. Delivery:</strong>
                            <span th:text="${#temporals.format(shipment.estimatedDelivery, 'dd MMM yyyy')}"></span></p>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 mt-2">
                <a th:href="@{/orders}" class="btn btn-outline">← Back to Orders</a>
                <form th:if="${order.status.name() == 'PENDING' or order.status.name() == 'CONFIRMED'}" th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('Cancel this order?')">Cancel Order</button>
                </form>
            </div>
        </div>
    </body>
</html>
