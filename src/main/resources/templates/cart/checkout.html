<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: head('Checkout')}"></head>
    <body>
        <div th:replace="~{fragments/layout :: navbar(${cart})}"></div>

        <div class="page-content container" style="max-width:860px">
            <h1 class="page-title">Checkout</h1>

            <div class="alert alert-danger" th:if="${checkoutError}" th:text="${checkoutError}"></div>

            <div class="grid-2" style="gap:1.5rem; align-items:start">
                <div class="card">
                    <div class="card-header">Order Summary</div>
                    <div class="card-body" style="padding:0">
                        <table style="margin:0">
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Qty</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${cartItems}">
                                    <td th:text="${item.productName}"></td>
                                    <td th:text="${item.quantity}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="cart-total" style="border-radius:0; margin-top:0">
                            <span class="cart-total-label">Order Total</span>
                            <span class="cart-total-amount" th:text="'$' + ${#numbers.formatDecimal(cart.total, 1, 2)}"></span>
                        </div>
                    </div>
                </div>

                <div>
                    <form th:action="@{/cart/checkout}" method="post">
                        <div class="card mb-2">
                            <div class="card-header">Delivery Details</div>
                            <div class="card-body">
                                <div class="form-group">
                                    <label class="form-label">Deliver to *</label>
                                    <input name="deliveryAddress" type="text" class="form-control"
                                           th:value="${defaultAddress != null ? defaultAddress.formattedAddress : ''}"
                                           required placeholder="e.g. 10 Test St, Melbourne VIC 3000"/>
                                    <div class="form-text">Pre-filled from your profile. Change if needed.</div>
                                </div>
                            </div>
                        </div>
                        <div class="card mb-2">
                            <div class="card-header">Payment</div>
                            <div class="card-body">
                                <div class="alert alert-info">
                                    💳 Payment processing is simulated. Your order will be confirmed automatically.
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Card Number</label>
                                    <input type="text" class="form-control" placeholder="•••• •••• •••• ••••" disabled/>
                                </div>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label class="form-label">Expiry</label>
                                        <input type="text" class="form-control" placeholder="MM/YY" disabled/>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">CVV</label>
                                        <input type="text" class="form-control" placeholder="•••" disabled/>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-accent btn-lg" style="width:100%; justify-content:center">
                            Place Order →
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
