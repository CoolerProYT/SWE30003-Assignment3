<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: head('My Account')}"></head>
    <body>
        <div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
        <div class="page-content container">
            <h1 class="page-title">My Account</h1>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <div class="alert alert-success" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></div>
            <div class="alert alert-danger" th:if="${passwordError}" th:text="${passwordError}"></div>

            <div class="grid-2" style="gap:1.5rem;align-items:start">
                <div class="card">
                    <div class="card-header">Profile & Default Address</div>
                    <div class="card-body">
                        <form th:action="@{/account/update}" method="post">
                            <div class="form-group">
                                <label class="form-label">Full Name *</label>
                                <input name="fullName" type="text" class="form-control" th:value="${customer.fullName}" required maxlength="100"/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:value="${customer.email}" disabled/>
                                <div class="form-text">Email cannot be changed.</div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone *</label>
                                <input name="phone" type="tel" class="form-control" th:value="${customer.phone}" required/>
                            </div>
                            <hr class="divider"/>
                            <p style="font-weight:600;font-size:.875rem;margin-bottom:.75rem">Default Delivery
                                Address</p>
                            <div class="form-group">
                                <label class="form-label">Street *</label>
                                <input name="street" type="text" class="form-control" required th:value="${defaultAddress != null ? defaultAddress.street : ''}"/>
                            </div>
                            <div class="grid-2">
                                <div class="form-group">
                                    <label class="form-label">Suburb *</label>
                                    <input name="suburb" type="text" class="form-control" required th:value="${defaultAddress != null ? defaultAddress.suburb : ''}"/>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">State *</label>
                                    <select name="state" class="form-control form-select" required>
                                        <option th:each="s : ${ {'VIC','NSW','QLD','WA','SA','TAS','ACT','NT'} }" th:value="${s}" th:text="${s}" th:selected="${defaultAddress != null and defaultAddress.state == s}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Postcode *</label>
                                <input name="postcode" type="text" class="form-control" required maxlength="4" th:value="${defaultAddress != null ? defaultAddress.postcode : ''}"/>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Change Password</div>
                    <div class="card-body">
                        <form th:action="@{/account/change-password}" method="post">
                            <div class="form-group">
                                <label class="form-label">Current Password *</label>
                                <input name="currentPassword" type="password" class="form-control" required/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">New Password * <span class="form-text">(min 6)</span></label>
                                <input name="newPassword" type="password" class="form-control" required minlength="6"/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirm New Password *</label>
                                <input name="confirmNewPassword" type="password" class="form-control" required/>
                            </div>
                            <button type="submit" class="btn btn-outline">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="card mt-2">
                <div class="card-header">Order History</div>
                <div class="card-body" style="padding:0">
                    <div th:if="${#lists.isEmpty(orders)}" style="padding:1.5rem;color:var(--text-muted);text-align:center">
                        No orders yet. <a th:href="@{/catalogue}">Browse the catalogue →</a>
                    </div>
                    <div class="table-wrap" th:unless="${#lists.isEmpty(orders)}">
                        <table>
                            <thead>
                                <tr>
                                    <th>Order #</th>
                                    <th>Date</th>
                                    <th>Items</th>
                                    <th>Total</th>
                                    <th>Invoice</th>
                                    <th>Status</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${orders}">
                                    <td th:text="'#' + ${order.id}"></td>
                                    <td th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy')}"></td>
                                    <td th:text="${#lists.size(order.items)}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></td>
                                    <td>
                                        <span th:if="${order.invoice != null}" th:text="${order.invoice.invoiceNumber}" style="font-size:.8rem;color:var(--text-muted)"></span>
                                        <span th:unless="${order.invoice != null}" class="text-muted">—</span>
                                    </td>
                                    <td>
                                        <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}"></span>
                                    </td>
                                    <td>
                                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline">View</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
