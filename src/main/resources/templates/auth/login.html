<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Login – Shaden TCG Shop</title>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
    </head>
    <body>
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">⚔ SHADEN TCG SHOP</div>
                    <div class="auth-subtitle">Sign in to your account</div>
                </div>
                <div class="auth-body">

                    <div class="alert alert-danger" th:if="${loginError}" th:text="${loginError}"></div>
                    <div class="alert alert-success" th:if="${logoutMessage}" th:text="${logoutMessage}"></div>
                    <div class="alert alert-success" th:if="${registerSuccess}" th:text="${registerSuccess}"></div>

                    <form th:action="@{/auth/login}" method="post">
                        <div class="form-group">
                            <label class="form-label" for="username">Email Address</label>
                            <input id="username" name="username" type="email" class="form-control" placeholder="you@example.com" required autofocus/>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-full btn-lg" style="width:100%; justify-content:center; margin-top:0.5rem">
                            Sign In
                        </button>
                    </form>

                    <hr class="divider"/>
                    <p style="text-align:center; font-size:0.875rem; color:var(--text-muted)">
                        Don't have an account?
                        <a th:href="@{/auth/register}" style="color:var(--primary); font-weight:600;">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
