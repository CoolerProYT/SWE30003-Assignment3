<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: head('Shipment Detail')}"></head>
    <body>
        <div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
        <div class="page-content container" style="max-width:740px">
            <div class="flex justify-between items-center mb-2">
                <h1 class="page-title" style="margin:0" th:text="'Shipment #' + ${shipment.id}"></h1>
                <span class="badge" style="font-size:0.9rem; padding:0.4rem 1rem" th:classappend="'badge-' + ${#strings.toLowerCase(shipment.status)}" th:text="${shipment.status}"></span>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="card mb-2">
                <div class="card-header">Shipment Info</div>
                <div class="card-body">
                    <p><strong>Order:</strong>
                        <a th:href="@{/orders/{id}(id=${shipment.order.id})}" th:text="'#' + ${shipment.order.id}"></a>
                    </p>
                    <p class="mt-1"><strong>Customer:</strong>
                        <span th:text="${shipment.order.customer.fullName}"></span>
                        (<span th:text="${shipment.order.customer.email}"></span>)
                    </p>
                    <p class="mt-1"><strong>Delivery Address:</strong>
                        <span th:text="${shipment.deliveryAddress}"></span></p>
                    <p class="mt-1" th:if="${shipment.packageNotes}"><strong>Package Notes:</strong>
                        <span th:text="${shipment.packageNotes}"></span></p>
                    <p class="mt-1" th:if="${shipment.courierName}"><strong>Courier:</strong>
                        <span th:text="${shipment.courierName}"></span></p>
                    <p class="mt-1" th:if="${shipment.trackingNumber}"><strong>Tracking #:</strong>
                        <span th:text="${shipment.trackingNumber}"></span></p>
                    <p class="mt-1" th:if="${shipment.estimatedDelivery}"><strong>Est. Delivery:</strong>
                        <span th:text="${#temporals.format(shipment.estimatedDelivery, 'dd MMM yyyy')}"></span></p>
                    <p class="mt-1" th:if="${shipment.dispatchedAt}"><strong>Dispatched At:</strong>
                        <span th:text="${#temporals.format(shipment.dispatchedAt, 'dd MMM yyyy HH:mm')}"></span></p>
                    <p class="mt-1" th:if="${shipment.deliveredAt}"><strong>Delivered At:</strong>
                        <span th:text="${#temporals.format(shipment.deliveredAt, 'dd MMM yyyy HH:mm')}"></span></p>
                </div>
            </div>

            <div class="card mb-2" th:if="${shipment.status.name() == 'PENDING'}">
                <div class="card-header">Mark as Packed</div>
                <div class="card-body">
                    <form th:action="@{/admin/shipments/{id}/pack(id=${shipment.id})}" method="post">
                        <div class="form-group">
                            <label class="form-label">Package Notes (optional)</label>
                            <input name="packageNotes" type="text" class="form-control" placeholder="e.g. Bubble-wrapped, 2 boxes"/>
                        </div>
                        <button type="submit" class="btn btn-primary">Mark Packed</button>
                    </form>
                </div>
            </div>

            <div class="card mb-2" th:if="${shipment.status.name() == 'PACKED'}">
                <div class="card-header">Dispatch Shipment</div>
                <div class="card-body">
                    <form th:action="@{/admin/shipments/{id}/dispatch(id=${shipment.id})}" method="post">
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label">Courier Name *</label>
                                <input name="courierName" type="text" class="form-control" required placeholder="e.g. Australia Post"/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Tracking Number *</label>
                                <input name="trackingNumber" type="text" class="form-control" required placeholder="e.g. EP123456789AU"/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Estimated Delivery Date</label>
                            <input name="estimatedDelivery" type="date" class="form-control" th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
                        </div>
                        <button type="submit" class="btn btn-warning">Dispatch</button>
                    </form>
                </div>
            </div>

            <div class="card mb-2" th:if="${shipment.status.name() == 'DISPATCHED'}">
                <div class="card-header">Confirm Delivery</div>
                <div class="card-body">
                    <form th:action="@{/admin/shipments/{id}/deliver(id=${shipment.id})}" method="post">
                        <p class="text-muted mb-1">Click below to confirm this shipment has been delivered.</p>
                        <button type="submit" class="btn btn-success">Mark Delivered</button>
                    </form>
                </div>
            </div>

            <a th:href="@{/admin/shipments}" class="btn btn-outline">← Back to Shipments</a>
        </div>
    </body>
</html>
