<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: head('Admin – Shipments')}"></head>
    <body>
        <div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
        <div class="page-content container">
            <h1 class="page-title">Shipment Management</h1>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Order</th>
                                <th>Customer</th>
                                <th>Status</th>
                                <th>Courier</th>
                                <th>Tracking</th>
                                <th>Created</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${shipments}">
                                <td th:text="${s.id}"></td>
                                <td><a th:href="@{/orders/{id}(id=${s.order.id})}" th:text="'#' + ${s.order.id}"></a>
                                </td>
                                <td th:text="${s.order.customer.fullName}"></td>
                                <td>
                        <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(s.status)}" th:text="${s.status}"></span>
                                </td>
                                <td th:text="${s.courierName ?: '–'}"></td>
                                <td th:text="${s.trackingNumber ?: '–'}"></td>
                                <td th:text="${#temporals.format(s.createdAt, 'dd MMM yyyy')}"></td>
                                <td><a th:href="@{/admin/shipments/{id}(id=${s.id})}" class="btn btn-sm btn-outline">Manage</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
