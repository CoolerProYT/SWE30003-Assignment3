<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Orders')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
<div class="page-content container">
    <h1 class="page-title">My Orders</h1>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body" style="padding:0">
            <div th:if="${#lists.isEmpty(orders)}" style="padding:2rem; text-align:center; color:var(--text-muted)">
                You haven't placed any orders yet. <a th:href="@{/catalogue}">Shop now →</a>
            </div>
            <div class="table-wrap" th:if="${!#lists.isEmpty(orders)}">
                <table>
                    <thead><tr><th>Order #</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td><strong th:text="'#' + ${order.id}"></strong></td>
                        <td th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td th:text="${#lists.size(order.items)} + ' item(s)'"></td>
                        <td><strong th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></strong></td>
                        <td>
                            <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}"
                                  th:text="${order.status}"></span>
                        </td>
                        <td><a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline">Details</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
