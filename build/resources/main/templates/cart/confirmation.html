<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Order Confirmed')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar(${cart})}"></div>
<div class="page-content container" style="max-width:640px;text-align:center">
    <div style="font-size:4rem;margin-bottom:1rem">✅</div>
    <h1 class="page-title" style="text-align:center">Order Confirmed!</h1>
    <p class="text-muted" style="margin-bottom:1.5rem">
        Your order <strong th:text="'#' + ${order.id}"></strong> has been placed successfully.
    </p>

    <div class="card mb-2" style="text-align:left">
        <div class="card-header">Order & Payment Summary</div>
        <div class="card-body">
            <!-- Invoice (A2: Order generates 1 Invoice) -->
            <div th:if="${order.invoice != null}">
                <p><strong>Invoice Number:</strong>
                    <span th:text="${order.invoice.invoiceNumber}"
                          style="font-family:'Rajdhani',sans-serif;font-size:1.05rem;color:var(--primary)"></span>
                </p>
                <p class="mt-1"><strong>Subtotal (excl. GST):</strong>
                    <span th:text="'$' + ${#numbers.formatDecimal(order.invoice.subtotal, 1, 2)}"></span></p>
                <p class="mt-1"><strong>GST (10%):</strong>
                    <span th:text="'$' + ${#numbers.formatDecimal(order.invoice.gstAmount, 1, 2)}"></span></p>
                <p class="mt-1"><strong>Total (incl. GST):</strong>
                    <span style="font-weight:700;color:var(--accent)"
                          th:text="'$' + ${#numbers.formatDecimal(order.invoice.totalAmount, 1, 2)}"></span></p>
            </div>
            <hr class="divider"/>
            <!-- Payment (A2: Order has 0..1 Payment) -->
            <div th:if="${order.payment != null}">
                <p><strong>Payment Status:</strong>
                    <span class="badge badge-delivered" th:text="${order.payment.status}"></span></p>
                <p class="mt-1"><strong>Payment Reference:</strong>
                    <span class="text-muted" th:text="${order.payment.paymentReference}"></span></p>
                <p class="mt-1"><strong>Method:</strong>
                    <span th:text="${order.payment.paymentMethod}"></span></p>
            </div>
            <hr class="divider"/>
            <p><strong>Delivery to:</strong> <span th:text="${order.deliveryAddress}"></span></p>
        </div>
    </div>

    <div class="flex gap-2" style="justify-content:center">
        <a th:href="@{/orders}" class="btn btn-primary">View My Orders</a>
        <a th:href="@{/catalogue}" class="btn btn-outline">Continue Shopping</a>
    </div>
</div>
</body>
</html>
