<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' – Shaden TCG Shop'">Shaden TCG Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:fragment="navbar(cart)" class="navbar">
    <a class="navbar-brand" th:href="@{/catalogue}">⚔ SHADEN</a>
    <div class="navbar-nav">
        <a th:href="@{/catalogue}" th:classappend="${currentPage == 'catalogue'} ? 'active'">Catalogue</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/orders}" th:classappend="${currentPage == 'orders'} ? 'active'">My Orders</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/products}">Products</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/orders}">Orders</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/products}">Products</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/orders}">Orders</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/shipments}">Shipments</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/reports}">Reports</a>
    </div>
    <div class="navbar-right">
        <a sec:authorize="isAuthenticated()" th:href="@{/cart}" class="btn btn-outline" style="color:white; border-color:rgba(255,255,255,0.4);">
            🛒 Cart
            <span class="cart-badge" th:if="${cart != null and cart.totalItemCount > 0}"
                  th:text="${cart.totalItemCount}">0</span>
        </a>
        <a sec:authorize="isAuthenticated()" th:href="@{/account}" class="btn btn-outline" style="color:white; border-color:rgba(255,255,255,0.4);">
            👤 <span sec:authentication="name">User</span>
        </a>
        <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post" style="margin:0">
            <button type="submit" class="btn btn-accent btn-sm">Logout</button>
        </form>
        <a sec:authorize="!isAuthenticated()" th:href="@{/auth/login}" class="btn btn-accent btn-sm">Login</a>
    </div>
</nav>

</body>
</html>
